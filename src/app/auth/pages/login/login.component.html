<div class="flex min-h-full flex-col justify-center px-6 py-12 lg:px-8">
	<div class="sm:mx-auto sm:w-full sm:max-w-sm">
		<img class="mx-auto h-18 w-auto" src="assets/images/login/logodevida.png" alt="Your Company">
		<h2 class="mt-10 text-center text-2xl/9 font-bold tracking-tight text-gray-900">INICIAR SESION
		</h2>
		<app-google-buttom (onClick)="submitWithGoogle()"></app-google-buttom>
	</div>

	<div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">

		<form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
			<!-- Campo Correo -->
			<div>
				<label for="email" class="block text-sm font-medium text-gray-900 dark:text-white">
					Correo
				</label>
				<input type="email" name="email" id="email" aria-label="Correo electrónico" class="w-full p-2.5 bg-gray-50 border border-gray-300 text-gray-900 rounded-lg focus:ring-primary-600
					focus:border-primary-600 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white
					dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="Correo electrónico" formControlName="email" />

				<small *ngIf="isRequired('email')" class="text-red-500">Este campo es requerido</small>
				<small *ngIf="hasEmailError()" class="text-red-500">El correo es incorrecto</small>
			</div>

			<!-- Campo Contraseña -->
			<div>
				<label for="password" class="block text-sm font-medium text-gray-900 dark:text-white">
					Contraseña
				</label>
				<input type="password" name="password" id="password" aria-label="Contraseña" class="w-full p-2.5 bg-gray-50 border border-gray-300 text-gray-900 rounded-lg focus:ring-primary-600
					focus:border-primary-600 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white
					dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="Contraseña" formControlName="password" />

				<small *ngIf="isRequired('password')" class="text-red-500">Este campo es requerido</small>
			</div>

			<!-- Botón de Enviar -->
			<button type="submit" class="w-full text-white  bg-primary hover:bg-secondary focus:ring-4 focus:outline-none focus:ring-primary-300
				font-medium rounded-lg text-sm px-5 py-2.5 text-center transition-all dark:bg-primary-600 dark:hover:bg-primary-700
				dark:focus:ring-primary-800">
				Ingresar
			</button>
			<p class="text-sm font-light text-gray-500 dark:text-gray-400 text-center">
				¿Aún no tienes una cuenta?
				<a href="#" class="font-medium text-primary-600 hover:underline dark:text-primary-500">
					Crear una cuenta
				</a>
			</p>
		</form>
	</div>
</div>
