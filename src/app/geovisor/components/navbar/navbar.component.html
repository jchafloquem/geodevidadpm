<div
	id="navbar"
	class="fixed top-0 flex w-full bg-secondary px-3 h-16 gap-3 items-center z-10 shadow-lg"
>
	<!-- Logo grande -->
	<div class="hidden md:block">
		<img class="h-14" src="assets/images/geovisor/logoWelBN.png" alt="Logo grande" />
	</div>

	<!-- Logo pequeño -->
	<div class="block md:hidden">
		<img
			class="h-14"
			src="assets/images/logoWelBNMini.png"
			alt="Logo pequeño"
		/>
	</div>

	<!-- Contenedor centrado para la búsqueda -->
	<div class="flex-1 flex justify-end">
		<div id="searchDiv"></div>
	</div>

	<!-- Botón de Logout -->
	<button
		(click)="logout()"
		id="logoutBtn"
		class="bg-primary text-white px-4 py-2 rounded-lg hover:bg-primary transition-all flex items-center gap-2"
	>
		🔓 Salir
	</button>
</div>

<!-- Navbar end -->
<script type="text/javascript">
	document.addEventListener("DOMContentLoaded", () => {
		const navbar = document.getElementById("navbar");
		const sidebar = document.getElementById("sidebar");
		const btnSidebarToggler = document.getElementById("btnSidebarToggler");
		const navClosed = document.getElementById("navClosed");
		const navOpen = document.getElementById("navOpen");

		btnSidebarToggler.addEventListener("click", (e) => {
			e.preventDefault();
			sidebar.classList.toggle("show");
			navClosed.classList.toggle("hidden");
			navOpen.classList.toggle("hidden");
		});
		sidebar.style.top = parseInt(navbar.clientHeight) - 1 + "px";
	});
</script>
